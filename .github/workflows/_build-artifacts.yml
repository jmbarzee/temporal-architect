name: _build-artifacts

# Reusable: build the platform-independent library tarballs.
#
# Outputs (as workflow artifacts, consumed by _publish-github-release.yml and
# _publish-npm-libs.yml):
#   release-artifacts         — visualizer lib tarball + wire-types tarball
#                               (both under dist/)
#
# These libraries are built AND published to npm here (their source, version
# stamp, and repository.url all live in the toolchain). They are also attached
# to the GitHub Release so the distribution repo can consume them at build time
# (file:) without an npm round-trip.

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag including leading 'v', e.g. 'v0.3.2'."
        type: string
        required: true

jobs:
  artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install visualizer dependencies
        run: cd tools/visualizer && npm ci

      - name: Pack visualizer lib
        run: make pack-visualizer-lib

      - name: Pack wire-types
        run: make pack-wire-types

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.tgz
