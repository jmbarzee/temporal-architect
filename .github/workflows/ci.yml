name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lsp/go.mod

      - run: make vet
      - run: make test

      - name: Verify command reference is up to date
        run: make check-docs

      - name: Verify generated wire types are up to date
        run: make check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lsp/go.mod

      - name: Install dependencies
        run: cd tools/visualizer && npm ci

      - name: Build toolchain (binary + visualizer lib/webview)
        run: make build

      - name: Verify release artifacts pack
        run: |
          make pack-visualizer-lib
          make pack-wire-types
