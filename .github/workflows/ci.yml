name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lsp/go.mod

      - run: make vet
      - run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lsp/go.mod

      - name: Install dependencies
        run: |
          cd packages/vscode && npm ci
          cd ../../tools/visualizer && npm ci

      - run: make build

      - name: Verify VSIX packaging
        run: make package

  verify-plugin-sync:
    name: Verify Claude Code plugin is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: internal/release/sync-plugin/go.mod

      - name: Check plugin copies match canonical sources
        run: go run ./internal/release/sync-plugin -check
