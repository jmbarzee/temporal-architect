name: _build-binaries

# Reusable: matrix build of the twf binary archive, one per platform.
#
# Outputs (as workflow artifacts, consumed by _publish-github-release.yml):
#   twf-archive-<platform>    — twf-vX.Y.Z-<os>-<arch>.{tar.gz,zip}
#
# Pure build work; no publishing and no VSIX (the extension/VSIX moved to the
# distribution repo, which downloads these archives to stage npm/pypi packages
# and to bundle the binary into the VSIX).

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag including leading 'v', e.g. 'v0.3.2'."
        type: string
        required: true

jobs:
  binaries:
    name: Build (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: darwin-arm64
            goos: darwin
            goarch: arm64
          - label: darwin-x64
            goos: darwin
            goarch: amd64
          - label: linux-x64
            goos: linux
            goarch: amd64
          - label: linux-arm64
            goos: linux
            goarch: arm64
          - label: win32-x64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lsp/go.mod

      - name: Package twf archive
        run: make build-twf-archive VERSION=${{ inputs.version }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload twf archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: twf-archive-${{ matrix.label }}
          path: dist/twf-*
