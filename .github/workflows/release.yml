name: Release

# Orchestrator. Triggered by every `v*` tag push.
#
# All real work is in per-phase reusable workflows:
#   _check-versions.yml          — assert every manifest matches the tag
#   _build-binaries.yml          — matrix builds twf binary + VSIX + archives
#   _build-skills-tarball.yml    — package skills/ as a release asset
#   _publish-vsix.yml            — VS Code Marketplace + Open VSX
#   _publish-npm-twf.yml         — @temporal-architect/twf wrapper + 5 sub-pkgs
#   _publish-npm-visualizer.yml  — @temporal-architect/visualizer
#   _publish-npm-claude-plugin.yml — @temporal-architect/claude-plugin (Claude Code plugin payload)
#   _publish-pypi.yml            — twf-cli wheels × 5 + single twine upload
#   _publish-github-release.yml  — checksums + GitHub Release with all assets
#   _publish-brew.yml            — bump jmbarzee/homebrew-twf formula
#
# This file is intentionally thin: declare the dependency graph and pass
# secrets to the reusables that need them. When adding a new publish channel,
# add one job here that `uses:` the new reusable. Don't inline steps here.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Pre-flight ───────────────────────────────────────────────────────────

  check-versions:
    uses: ./.github/workflows/_check-versions.yml
    with:
      version: ${{ github.ref_name }}

  # ── Build (artifacts consumed by publish jobs) ───────────────────────────

  build-binaries:
    needs: check-versions
    uses: ./.github/workflows/_build-binaries.yml
    with:
      version: ${{ github.ref_name }}

  build-skills-tarball:
    needs: check-versions
    uses: ./.github/workflows/_build-skills-tarball.yml
    with:
      version: ${{ github.ref_name }}

  # ── Publish (one channel per job, run in parallel after their deps) ──────

  publish-vsix:
    needs: build-binaries
    uses: ./.github/workflows/_publish-vsix.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

  publish-npm-twf:
    needs: build-binaries
    uses: ./.github/workflows/_publish-npm-twf.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: build-binaries
    uses: ./.github/workflows/_publish-pypi.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish-npm-visualizer:
    needs: check-versions
    uses: ./.github/workflows/_publish-npm-visualizer.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-claude-plugin:
    needs: check-versions
    uses: ./.github/workflows/_publish-npm-claude-plugin.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-release:
    needs: [build-binaries, build-skills-tarball]
    uses: ./.github/workflows/_publish-github-release.yml
    with:
      version: ${{ github.ref_name }}

  publish-brew:
    # Needs the GitHub Release to exist so the formula's URLs + SHAs are pinnable.
    needs: publish-github-release
    uses: ./.github/workflows/_publish-brew.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
