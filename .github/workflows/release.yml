name: Release

# Orchestrator. Triggered by every `v*` tag push.
#
# After the distribution split the toolchain is a pure release-cutter: it builds
# primitive artifacts and publishes the canonical GitHub Release, then dispatches
# to the distribution repo (jmbarzee/temporal-architect-dist), which downloads
# those assets and publishes every registry package.
#
# All real work is in per-phase reusable workflows:
#   _check-versions.yml          — assert the visualizer + wire-types manifests match the tag
#   _build-binaries.yml          — matrix builds the twf binary archives
#   _build-skills-tarball.yml    — package skills/ as a release asset
#   _build-artifacts.yml         — visualizer lib + webview bundle + wire-types tarballs
#   _publish-github-release.yml  — checksums + GitHub Release with all assets
#
# This file is intentionally thin: declare the dependency graph and pass the
# dispatch secret. Registry publishing lives in the distribution repo.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Pre-flight ───────────────────────────────────────────────────────────

  check-versions:
    uses: ./.github/workflows/_check-versions.yml
    with:
      version: ${{ github.ref_name }}

  # ── Build (artifacts the Release ships) ──────────────────────────────────

  build-binaries:
    needs: check-versions
    uses: ./.github/workflows/_build-binaries.yml
    with:
      version: ${{ github.ref_name }}

  build-skills-tarball:
    needs: check-versions
    uses: ./.github/workflows/_build-skills-tarball.yml
    with:
      version: ${{ github.ref_name }}

  build-artifacts:
    needs: check-versions
    uses: ./.github/workflows/_build-artifacts.yml
    with:
      version: ${{ github.ref_name }}

  # ── Cut the canonical GitHub Release ─────────────────────────────────────

  publish-github-release:
    needs: [build-binaries, build-skills-tarball, build-artifacts]
    uses: ./.github/workflows/_publish-github-release.yml
    with:
      version: ${{ github.ref_name }}

  # ── Hand off to the distribution repo ────────────────────────────────────

  dispatch-dist:
    # Fires only after the Release (and its assets) exist, so dist can download
    # them immediately. Lockstep is automatic: dist stamps the incoming version
    # into its manifests and never tags independently.
    needs: publish-github-release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch toolchain-release to distribution repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DIST_DISPATCH_TOKEN }}
          repository: jmbarzee/temporal-architect-dist
          event-type: toolchain-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
