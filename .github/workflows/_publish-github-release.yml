name: _publish-github-release

# Reusable: create the GitHub Release with all downloadable assets +
# SHA256SUMS. This Release is the canonical, durable contract the distribution
# repo and the Homebrew tap pin to. Consumes:
#   twf-archive-*       (from _build-binaries.yml)   — per-platform binary archives
#   skills-tarball      (from _build-skills-tarball.yml)
#   release-artifacts   (from _build-artifacts.yml)  — visualizer lib + webview + wire-types

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag including leading 'v', e.g. 'v0.3.2'."
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: twf-archive-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: skills-tarball
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum twf-* skills-* *.tgz visualizer-webview-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/twf-*
            dist/skills-*
            dist/*.tgz
            dist/visualizer-webview-*
            dist/SHA256SUMS
            packages/install.sh
          generate_release_notes: true
