name: _check-versions

# Reusable: assert that the toolchain's own published-package manifests match
# the release tag (leading "v" stripped). After the distribution split the
# toolchain only publishes two npm packages from its release assets — the
# visualizer library and the wire-types contract; every other manifest lives in
# the distribution repo and is version-checked there.
# Called by release.yml; not directly triggerable.

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag including leading 'v', e.g. 'v0.3.2'."
        type: string
        required: true

jobs:
  check:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every manifest matches the tag
        run: |
          TAG_VERSION="${VERSION#v}"
          echo "Git tag: v${TAG_VERSION}"
          fail=0
          check_node() {
            local label="$1" file="$2"
            local actual
            actual="$(node -p "require('./$file').version")"
            echo "  ${label}: ${actual}"
            if [ "$actual" != "$TAG_VERSION" ]; then
              echo "::error file=${file}::version ${actual} does not match tag v${TAG_VERSION}"
              fail=1
            fi
          }
          check_node "tools/visualizer" tools/visualizer/package.json
          check_node "tools/wire-types" tools/wire-types/package.json
          exit $fail
        env:
          VERSION: ${{ inputs.version }}
